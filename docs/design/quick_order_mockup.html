<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>PetManager 快速开单 (v2)</title>
    <style>
        :root {
            --p: #409eff;
            --bg: #f8fafc;
            --bd: #e2e8f0;
            --text: #1e293b;
            --text-light: #64748b;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background: var(--bg);
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text);
        }
        .main {
            flex: 1;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .sidebar {
            width: 320px;
            background: white;
            border-left: 1px solid var(--bd);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: -2px 0 8px rgba(0,0,0,0.02);
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid var(--bd);
        }
        .category-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
            flex: 1;
            overflow-y: auto;
            align-content: start;
        }
        .p-card {
            background: white;
            border-radius: 12px;
            border: 1px solid var(--bd);
            padding: 10px;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .p-card:hover {
            border-color: var(--p);
            box-shadow: 0 4px 12px rgba(64,158,255,0.1);
            transform: translateY(-2px);
        }
        .p-img {
            width: 100%;
            aspect-ratio: 1.2;
            background: #f1f5f9;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 22px;
        }
        .p-name {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .p-price {
            font-size: 14px;
            font-weight: bold;
            color: var(--p);
        }
        .btn {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid var(--bd);
            background: white;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .btn.active {
            background: var(--p);
            color: white;
            border-color: var(--p);
        }
        .btn-main {
            background: var(--p);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s;
        }
        .btn-main:hover {
            background: #3388ff;
        }
        .btn-secondary {
            background: #f1f5f9;
            color: var(--text-light);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }
        .select-container {
            display: flex;
            gap: 8px;
        }
        .select-box {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--bd);
            background: #f8fafc;
            font-size: 13px;
            color: var(--text-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 13px;
            border-bottom: 1px dashed var(--bd);
        }
        .order-item:last-child {
            border-bottom: none;
        }
        .total-area {
            margin-top: auto;
            border-top: 1px solid var(--bd);
            padding-top: 16px;
        }
    </style>
</head>
<body>
    <div class="main">
        <!-- 分类栏 -->
        <div class="card category-bar">
            <button class="btn active">全部商品</button>
            <button class="btn">洗护</button>
            <button class="btn">美容</button>
            <button class="btn">寄养</button>
            <button class="btn">零售</button>
            <button class="btn">会员服务</button>
        </div>
        <!-- 商品网格 -->
        <div class="grid">
            <div class="p-card">
                <div class="p-img">🛁</div>
                <div class="p-name">精油洗护 (大犬)</div>
                <div class="p-price">¥ 128.00</div>
            </div>
            <div class="p-card">
                <div class="p-img">✂️</div>
                <div class="p-name">全效美容 (中型)</div>
                <div class="p-price">¥ 198.00</div>
            </div>
            <div class="p-card">
                <div class="p-img">🦴</div>
                <div class="p-name">皇家成犬粮 2kg</div>
                <div class="p-price">¥ 156.00</div>
            </div>
            <div class="p-card">
                <div class="p-img">🏠</div>
                <div class="p-name">豪华寄养房/天</div>
                <div class="p-price">¥ 88.00</div>
            </div>
            <div class="p-card">
                <div class="p-img">🧼</div>
                <div class="p-name">药浴除螨</div>
                <div class="p-price">¥ 45.00</div>
            </div>
            <div class="p-card">
                <div class="p-img">🦷</div>
                <div class="p-name">洁牙护理</div>
                <div class="p-price">¥ 35.00</div>
            </div>
        </div>
        <!-- 已选列表 -->
        <div class="card">
            <div class="section-title">已选列表 (2)</div>
            <div class="order-list">
                <div class="order-item">
                    <span>精油洗护 (大犬) x1</span>
                    <span style="font-weight:500">¥128.00</span>
                </div>
                <div class="order-item">
                    <span>药浴除螨 x1</span>
                    <span style="font-weight:500">¥45.00</span>
                </div>
            </div>
        </div>
    </div>
    <!-- 侧边结算栏 -->
    <div class="sidebar">
        <div>
            <div class="section-title">客户信息</div>
            <div class="select-container">
                <div class="select-box">
                    <span>搜索会员...</span>
                    <span>▼</span>
                </div>
                <div class="select-box">
                    <span>选择宠物...</span>
                    <span>▼</span>
                </div>
            </div>
        </div>
        
        <div class="total-area">
            <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px">
                <span style="font-size:14px;color:var(--text-light)">合计金额</span>
                <span style="font-size:24px;font-weight:800;color:var(--p)">¥ 173.00</span>
            </div>
            <div style="display:flex;gap:12px">
                <button class="btn-secondary" style="flex:1">取消</button>
                <button class="btn-main" style="flex:1">下单</button>
            </div>
        </div>
    </div>
</body>
</html>
