<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增服务项目 - PetManager</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg: #f8fafc;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: rgba(15, 23, 42, 0.5); /* 模拟遮罩层 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .dialog {
            background: var(--white);
            width: 560px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 800;
            color: var(--text-main);
        }

        .close-btn {
            color: var(--text-sub);
            cursor: pointer;
            font-size: 24px;
            transition: color 0.2s;
        }

        .close-btn:hover { color: var(--text-main); }

        .content {
            padding: 32px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .section-title {
            font-size: 14px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
            margin-left: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full {
            grid-column: span 2;
        }

        label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-sub);
        }

        input, select, textarea {
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s;
            background: var(--bg);
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .input-with-unit {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-with-unit input {
            width: 100%;
            padding-right: 45px;
        }

        .unit {
            position: absolute;
            right: 16px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-sub);
        }

        .image-upload {
            width: 100%;
            height: 120px;
            border: 2px dashed var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-sub);
            background: var(--bg);
        }

        .image-upload:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        .footer {
            padding: 24px 32px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-cancel {
            background: transparent;
            color: var(--text-sub);
        }

        .btn-cancel:hover {
            background: #e2e8f0;
            color: var(--text-main);
        }

        .btn-save {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-save:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="dialog">
        <div class="header">
            <h2>新增服务项目</h2>
            <div class="close-btn">×</div>
        </div>

        <div class="content">
            <!-- Section 1: Base Info -->
            <div class="section-title">基础信息</div>
            <div class="form-grid">
                <div class="form-group full">
                    <label>服务名称</label>
                    <input type="text" placeholder="输入服务项目名称，如：精油SPA洗浴">
                </div>
                <div class="form-group">
                    <label>所属分类</label>
                    <select>
                        <option>洗护服务</option>
                        <option>美容造型</option>
                        <option>宠物医疗</option>
                        <option>寄养服务</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>标准时长</label>
                    <div class="input-with-unit">
                        <input type="number" placeholder="60">
                        <span class="unit">分钟</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>服务价格</label>
                    <div class="input-with-unit">
                        <input type="number" placeholder="0.00">
                        <span class="unit">¥</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>服务编码</label>
                    <input type="text" placeholder="SVR-自动生成" readonly style="background: #f1f5f9; color: #94a3b8;">
                </div>
                <div class="form-group full">
                    <label>封面图片</label>
                    <div class="image-upload">
                        <span style="font-size: 24px; margin-bottom: 8px;">📷</span>
                        <span>点击或拖拽上传封面</span>
                    </div>
                </div>
            </div>

            <!-- Section 2: Commission -->
            <div class="section-title">提成配置</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>固定提成金额</label>
                    <div class="input-with-unit">
                        <input type="number" placeholder="0.00">
                        <span class="unit">¥</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>比例提成 (%)</label>
                    <div class="input-with-unit">
                        <input type="number" placeholder="10">
                        <span class="unit">%</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <button class="btn btn-cancel">取消</button>
            <button class="btn btn-save">保存并上架</button>
        </div>
    </div>

</body>
</html>
